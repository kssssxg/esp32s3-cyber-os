# ESP32-S3 Cyber OS Build Workflow
# Multi-screen matrix build for 7 display configurations

name: ESP32-S3 Cyber OS Build (Multi-Screen)

on:
  push:
    branches: [main, master]
    paths:
      - 's3/**'
      - 'src/**'
      - '*.ino'
      - 'partitions.csv'
      - 'User_Setup.h'
      - '.github/workflows/**'
  pull_request:
    branches: [main, master]
    paths:
      - 's3/**'
      - 'src/**'
      - '*.ino'
      - 'partitions.csv'
      - 'User_Setup.h'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  BOARD_FQBN: esp32:esp32:esp32s3:FlashSize=16M

jobs:
  build:
    # FIX: Use macos-15-intel (x86_64 Intel) instead of ubuntu-latest/22.04 (now ARM64)
    # ESP32 board package's openocd-esp32 tool is not available for ARM64 Linux
    # macOS has Homebrew-supported OpenOCD that works on Intel architecture
    runs-on: macos-15-intel
    
    strategy:
      fail-fast: false
      matrix:
        screen:
          - {name: "240x240-Circular", driver: "0x7735", width: 240, height: 240, miso: 19, mosi: 13, sclk: 14, cs: 15, dc: 4, rst: 48}
          - {name: "240x280-Rect", driver: "0x9341", width: 240, height: 280, miso: 19, mosi: 13, sclk: 14, cs: 15, dc: 4, rst: 48}
          - {name: "320x480", driver: "0x9341", width: 320, height: 480, miso: 19, mosi: 13, sclk: 14, cs: 15, dc: 4, rst: 48}
          - {name: "480x480", driver: "0x9341", width: 480, height: 480, miso: 19, mosi: 13, sclk: 14, cs: 15, dc: 4, rst: 48}
          - {name: "240x320-ST7789", driver: "0x7789", width: 240, height: 320, miso: 19, mosi: 13, sclk: 14, cs: 15, dc: 4, rst: 48}
          - {name: "360x640", driver: "0x9341", width: 360, height: 640, miso: 19, mosi: 13, sclk: 14, cs: 15, dc: 4, rst: 48}
          - {name: "240x240-ILI9341", driver: "0x9341", width: 240, height: 240, miso: 19, mosi: 13, sclk: 14, cs: 15, dc: 4, rst: 48}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        run: |
          brew install arduino-cli
          arduino-cli version

      - name: Install ESP32 board package
        run: |
          arduino-cli config init
          arduino-cli core install esp32:esp32@2.0.17

      - name: Install libraries
        run: |
          # Libraries are pre-installed in ./libraries/ directory in the repo
          # Only install ArduinoJson from index (it's available there)
          arduino-cli lib install "ArduinoJson"

      - name: Configure TFT_eSPI for ${{ matrix.screen.name }}
        run: |
          # TFT_eSPI is in ./libraries/ directory
          LIB_PATH="./libraries/TFT_eSPI"
          
          cat > "$LIB_PATH/User_Setup.h" << EOF
          #define USER_SETUP_ID 1
          #define ESP32
          #define TFT_DRIVER ${{ matrix.screen.driver }}
          #define TFT_MISO ${{ matrix.screen.miso }}
          #define TFT_MOSI ${{ matrix.screen.mosi }}
          #define TFT_SCLK ${{ matrix.screen.sclk }}
          #define TFT_CS    ${{ matrix.screen.cs }}
          #define TFT_DC    ${{ matrix.screen.dc }}
          #define TFT_RST   ${{ matrix.screen.rst }}
          #define TOUCH_CS -1
          #define TFT_WIDTH  ${{ matrix.screen.width }}
          #define TFT_HEIGHT ${{ matrix.screen.height }}
          #define LOAD_GLCD   1
          #define LOAD_FONT2  1
          #define LOAD_FONT4  1
          #define LOAD_FONT6  1
          #define LOAD_FONT7  1
          #define LOAD_FONT8  1
          #define LOAD_GFXFF  1
          #define SMOOTH_FONT 1
          #define SPI_FREQUENCY  40000000
          EOF

      - name: Build firmware for ${{ matrix.screen.name }}
        run: |
          INO_FILE=$(find . -name "*.ino" -path "*/s3/*" | head -1)
          [ -z "$INO_FILE" ] && INO_FILE=$(find . -name "*.ino" | head -1)
          
          mkdir -p ./build/${{ matrix.screen.name }}
          
          arduino-cli compile \
            --fqbn $BOARD_FQBN \
            --output-dir ./build/${{ matrix.screen.name }} \
            --libraries ./libraries \
            --build-property build.extra_flags="-DBOARD_HAS_PSRAM -mfix-esp32-psram-cache-issue" \
            "$INO_FILE" || {
              echo "Build failed with PSRAM flags, trying without..."
              arduino-cli compile \
                --fqbn $BOARD_FQBN \
                --libraries ./libraries \
                --output-dir ./build/${{ matrix.screen.name }} \
                "$INO_FILE"
            }
          
          cd ./build/${{ matrix.screen.name }}
          for bin in *.bin; do
            [ -f "$bin" ] && mv "$bin" "cyberos-${{ matrix.screen.name }}-$(git rev-parse --short HEAD).bin"
          done

      - name: Upload artifacts for ${{ matrix.screen.name }}
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.screen.name }}-${{ github.sha }}
          path: build/${{ matrix.screen.name }}/
          retention-days: 30

  summary:
    runs-on: macos-15-intel
    needs: build
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "# 🔧 ESP32-S3 Cyber OS - Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${GITHUB_SHA::7} | **Branch:** $GITHUB_REF_NAME" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Screen | Status | Files |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          
          for dir in ./all-firmwares/*/; do
            [ -d "$dir" ] && {
              SCREEN=$(basename "$dir")
              COUNT=$(find "$dir" -name "*.bin" 2>/dev/null | wc -l)
              echo "| $SCREEN | ✅ | $COUNT |" >> $GITHUB_STEP_SUMMARY
            }
          done

  release:
    runs-on: macos-15-intel
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate release tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            TAG="build-$(date +%Y%m%d-%H%M)-${GITHUB_SHA::7}"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "ESP32-S3 Cyber OS ${{ steps.tag.outputs.tag }}"
          body: |
            ## 🔧 ESP32-S3 Cyber OS - Auto Build
            
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            
            ### 📦 Firmware Downloads
            - 240x240-Circular (0x7735)
            - 240x280-Rect (0x9341)
            - 320x480 (0x9341)
            - 480x480 (0x9341)
            - 240x320-ST7789 (0x7789)
            - 360x640 (0x9341)
            - 240x240-ILI9341 (0x9341)
            
            > 💡 Flash with: `esptool.py write_flash 0x10000 firmware.bin`
          files: artifacts/**/*
          prerelease: ${{ steps.tag.outputs.prerelease }}
          generate_release_notes: true
